spring:
  application:
    name: app
  # PostgreSQL数据库配置
  datasource:
    url: "填自己的"
    username: "填自己的"
    password: "填自己的"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update #首次启动用 create，表创建成功后，改回 update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  ai:
    openai:
      base-url: "填自己的"
      api-key: "填自己的"
      chat:
        options:
          model: "填自己的"
          temperature: 0.7
      # Embedding模型配置
      embedding:
        options:
          model: "填自己的"
    # 禁用自动重试机制，让异常立即返回
    retry:
      max-attempts: 1  # 不重试，失败立即返回
      on-client-errors: false
    # PostgreSQL Vector Store配置
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024  # 实际生成的向量维度
        initialize-schema: false # 开发环境设置为 true，方便快速启动。生产环境设置为 false，手动管理数据库 schema，避免意外变更。
        remove-existing-vector-store-table: false  # 保留现有表和数据
  threads:
    virtual:
      enabled: true
app:
  storage:
    endpoint: "填自己的"
    access-key: "填自己的"
    secret-key: "填自己的"
    bucket: "填自己的"
    region: ${APP_STORAGE_REGION:us-east-1}
springdoc:
  api-docs:
    path: /v3/api-docs        # OpenAPI JSON 数据接口的路径（默认值）
  swagger-ui:
    path: /swagger-ui.html    # Swagger UI 的访问路径（默认值）
    operationsSorter: method  # UI 界面上接口按照 HTTP 方法排序
    tagsSorter: alpha         # 标签按照字母排序
  packages-to-scan: org.nembx.app.module
agent:
  skills:
    dirs: classpath:/.claude/skills
server:
  port: 8080
