spring:
  # PostgreSQL数据库配置
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update #首次启动用 create，表创建成功后，改回 update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  ai:
    openai:
      base-url: ${AI_URL}
      api-key: ${AI_KEY}
      chat:
        options:
          model: ${AI_MODEL}
          temperature: 0.7
      # Embedding模型配置
      embedding:
        options:
          model: ${EMBEDDING_MODEL}
    # 禁用自动重试机制，让异常立即返回
    retry:
      max-attempts: 1  # 不重试，失败立即返回
      on-client-errors: false
    # PostgreSQL Vector Store配置
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024  # 实际生成的向量维度
        initialize-schema: true # 开发环境设置为 true，方便快速启动。生产环境设置为 false，手动管理数据库 schema，避免意外变更。
        remove-existing-vector-store-table: false  # 保留现有表和数据
  threads:
    virtual:
      enabled: true
app:
  storage:
    endpoint: ${APP_STORAGE_ENDPOINT}
    access-key: ${APP_STORAGE_ACCESS_KEY}
    secret-key: ${APP_STORAGE_SECRET_KEY}
    bucket: ${APP_STORAGE_BUCKET}
    region: ${APP_STORAGE_REGION}
springdoc:
  api-docs:
    path: /v3/api-docs        # OpenAPI JSON 数据接口的路径（默认值）
  swagger-ui:
    path: /swagger-ui.html    # Swagger UI 的访问路径（默认值）
    operationsSorter: method  # UI 界面上接口按照 HTTP 方法排序
    tagsSorter: alpha         # 标签按照字母排序
  packages-to-scan: org.nembx.app.module

logging:
  level:
    org.nembx.app: DEBUG
    # mac 需要将该类的日志级别设置为 OFF 或 FATAL
    io.netty.resolver.dns.DnsServerAddressStreamProviders: OFF

vector:
  topK: 12
  minScore: 0.05

rerank:
  baseUrl: ${RERANK_URL}
  apiKey: ${RERANK_KEY}
  model: ${RERANK_MODEL}
  finalTopK: 4
server:
  port: 8080
